server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # long cache for static assets, no cache for HTML/markdown/JSON
    location ~* \.(jpg|jpeg|png|gif|svg|webp|woff2?|ttf|eot|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(html|md|json)$ {
        add_header Cache-Control "no-cache";
    }

    # SPA-like fallback not needed (multi-page site) — return 404 normally
    location / {
        try_files $uri $uri/ =404;
    }
}
